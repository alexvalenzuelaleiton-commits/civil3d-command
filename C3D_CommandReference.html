<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Civil 3D — Command Reference</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#0D1117; --bg2:#161B22; --bg3:#1C2128;
  --border:rgba(255,255,255,0.06); --border2:rgba(255,255,255,0.1);
  --text:#E6EDF3; --muted:#7D8590; --hint:#484F58;
  --draft:#3FB950; --draft-bg:rgba(63,185,80,0.08); --draft-bd:rgba(63,185,80,0.2);
  --design:#A371F7; --design-bg:rgba(163,113,247,0.08); --design-bd:rgba(163,113,247,0.2);
  --accent:#58A6FF; --radius:10px;
}
html,body { min-height:100vh; background:var(--bg); color:var(--text); font-family:'Syne',sans-serif; }
.topbar {
  position:sticky; top:0; z-index:100;
  background:rgba(13,17,23,0.94); backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border2);
  padding:14px 24px; display:flex; align-items:center; gap:14px; flex-wrap:wrap;
}
.brand { display:flex; align-items:center; gap:10px; flex-shrink:0; }
.logo {
  width:32px; height:32px;
  background:linear-gradient(135deg,#58A6FF,#A371F7);
  border-radius:8px; display:flex; align-items:center; justify-content:center;
  font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600; color:#fff;
}
.brand-name { font-size:14px; font-weight:600; color:var(--text); letter-spacing:0.02em; white-space:nowrap; }
.brand-name span { color:var(--muted); font-weight:400; }
.divider { width:1px; height:28px; background:var(--border2); flex-shrink:0; }
.search-wrap { position:relative; flex:1; min-width:200px; max-width:520px; }
.search-wrap svg { position:absolute; left:11px; top:50%; transform:translateY(-50%); width:15px; height:15px; color:var(--hint); pointer-events:none; }
#searchInput {
  width:100%; background:var(--bg3); border:1px solid var(--border2); border-radius:8px;
  padding:8px 12px 8px 34px; font-size:13px; font-family:'Syne',sans-serif;
  color:var(--text); outline:none; transition:border-color 0.15s;
}
#searchInput:focus { border-color:var(--accent); }
#searchInput::placeholder { color:var(--hint); }
.filters { display:flex; gap:4px; flex-shrink:0; }
.fbtn {
  padding:6px 14px; border-radius:7px; border:1px solid var(--border2);
  background:var(--bg3); color:var(--muted); font-size:12px;
  font-family:'Syne',sans-serif; font-weight:500; cursor:pointer; transition:all 0.12s; white-space:nowrap;
}
.fbtn:hover { color:var(--text); border-color:rgba(255,255,255,0.2); }
.fbtn.f-all.on    { background:rgba(88,166,255,0.1); color:var(--accent); border-color:rgba(88,166,255,0.3); }
.fbtn.f-draft.on  { background:var(--draft-bg); color:var(--draft); border-color:var(--draft-bd); }
.fbtn.f-design.on { background:var(--design-bg); color:var(--design); border-color:var(--design-bd); }
.stats { margin-left:auto; font-size:11px; color:var(--hint); white-space:nowrap; flex-shrink:0; }
.container { max-width:1400px; margin:0 auto; padding:20px 24px 40px; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:8px; }
.card {
  background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius);
  padding:13px 15px; transition:border-color 0.12s,background 0.12s; cursor:default;
}
.card:hover { border-color:var(--border2); background:var(--bg3); }
.card-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:7px; gap:8px; }
.cmd { font-family:'JetBrains Mono',monospace; font-size:13.5px; font-weight:600; letter-spacing:0.04em; }
.cmd.drafting { color:var(--draft); }
.cmd.design   { color:var(--design); }
.card-right { display:flex; align-items:center; gap:6px; }
.badge { font-size:9px; padding:2px 8px; border-radius:20px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; }
.badge.drafting { background:var(--draft-bg); color:var(--draft); border:1px solid var(--draft-bd); }
.badge.design   { background:var(--design-bg); color:var(--design); border:1px solid var(--design-bd); }
.copy-btn {
  opacity:0; background:var(--bg3); border:1px solid var(--border2); border-radius:5px;
  color:var(--muted); cursor:pointer; padding:3px 7px; font-size:10px;
  font-family:'Syne',sans-serif; font-weight:500; transition:all 0.12s; white-space:nowrap;
}
.card:hover .copy-btn { opacity:1; }
.copy-btn:hover { color:var(--text); border-color:rgba(255,255,255,0.25); }
.copy-btn.ok { color:var(--draft); border-color:var(--draft-bd); }
.problem-label { font-size:9px; text-transform:uppercase; letter-spacing:0.08em; color:var(--hint); margin-bottom:2px; }
.problem-text  { font-size:12px; color:var(--muted); line-height:1.45; margin-bottom:5px; }
.solution-text { font-size:12px; color:var(--text); line-height:1.5; opacity:0.82; }
mark { background:rgba(88,166,255,0.2); color:var(--accent); border-radius:2px; padding:0 1px; }
.no-results { grid-column:1/-1; text-align:center; padding:4rem 1rem; color:var(--hint); font-size:14px; }
.footer { text-align:center; padding:16px; font-size:11px; color:var(--hint); border-top:1px solid var(--border); }
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">
    <div class="logo">C3D</div>
    <span class="brand-name">Civil 3D <span>Command Reference</span></span>
  </div>
  <div class="divider"></div>
  <div class="search-wrap">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/></svg>
    <input type="text" id="searchInput" placeholder="Search command or problem..." autocomplete="off" />
  </div>
  <div class="filters">
    <button class="fbtn f-all on"  id="btn-all">All</button>
    <button class="fbtn f-draft"   id="btn-drafting">Drafting</button>
    <button class="fbtn f-design"  id="btn-design">Design</button>
  </div>
  <div class="stats" id="stats"></div>
</div>
<div class="container"><div class="grid" id="grid"></div></div>
<div class="footer">AutoCAD Civil 3D &mdash; Command Reference &nbsp;&middot;&nbsp; Updated via Excel macro</div>

document.getElementById('btn-drafting').addEventListener('click', () => setFilter('drafting'));
document.getElementById('btn-design').addEventListener('click',   () => setFilter('design'));
document.getElementById('searchInput').addEventListener('input',  render);

function setFilter(f) {
  filter = f;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('on'));
  const map = {all:'btn-all', drafting:'btn-drafting', design:'btn-design'};
  document.getElementById(map[f]).classList.add('on');
  render();
}
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function hi(t,q){
  if(!q) return esc(t);
  return esc(t).replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>');
}
function render(){
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const f = COMMANDS.filter(c=>{
    return (filter==='all'||c.category===filter) &&
           (!q||c.cmd.toLowerCase().includes(q)||c.problem.toLowerCase().includes(q)||c.solution.toLowerCase().includes(q));
  });
  document.getElementById('stats').textContent = f.length+' of '+COMMANDS.length+' commands';
  if(!f.length){ document.getElementById('grid').innerHTML='<div class="no-results">No commands found.</div>'; return; }
  document.getElementById('grid').innerHTML = f.map(c=>`
    <div class="card">
      <div class="card-top">
        <span class="cmd ${c.category}">${hi(c.cmd,q)}</span>
        <div class="card-right">
          <button class="copy-btn" data-cmd="${esc(c.cmd)}">COPY</button>
          <span class="badge ${c.category}">${c.category==='drafting'?'Drafting':'Design'}</span>
        </div>
      </div>
      <p class="problem-label">Problem</p>
      <p class="problem-text">${hi(c.problem,q)}</p>
      <p class="solution-text">${hi(c.solution,q)}</p>
    </div>`).join('');
  document.querySelectorAll('.copy-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      navigator.clipboard.writeText(btn.dataset.cmd);
      btn.textContent='COPIED!'; btn.classList.add('ok');
      setTimeout(()=>{btn.textContent='COPY';btn.classList.remove('ok');},1200);
    });
  });
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){document.getElementById('searchInput').value='';render();}
});
render();

</script>
</body>
</html>
